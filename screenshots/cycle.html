<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="app.css"></head>
<body>
<div class="screen">
  <div class="statusbar">
    <span class="time">9:41</span>
    <span class="sys">
      <svg width="18" height="12" viewBox="0 0 18 12"><g fill="#1A1714"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2.5" width="3" height="9.5" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></g></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 11l2.2-2.8a3.2 3.2 0 00-4.4 0L8 11z" fill="#1A1714"/><path d="M3 5.4a7.5 7.5 0 0110 0" stroke="#1A1714" stroke-width="1.5" stroke-linecap="round"/><path d="M5.4 7.7a4.2 4.2 0 015.2 0" stroke="#1A1714" stroke-width="1.5" stroke-linecap="round"/></svg>

    </span>
  </div>

  <div class="content">
    <div style="padding-top:8px;">
      <div class="eyebrow">Stacks</div>
      <div class="headline" style="margin-top:9px;">Cycles you're <span class="ital">running</span>.</div>
    </div>

    <div class="btn-row" style="margin-top:18px;">
      <div class="btn">+ New cycle</div>
      <div class="btn sec" style="flex:0 0 38%;">Vials</div>
    </div>

    <div class="eyebrow-row section"><span class="eyebrow">Recent activity</span><span class="rule"></span></div>
    <div class="sched" style="padding:14px 0;">
      <div class="time">2h</div>
      <div class="mid">
        <div class="ttl" style="font-size:18px;">BPC-157</div>
        <div class="det"><span class="dose">250</span><span class="du-chip">mcg</span><span class="dt">· SubQ · abdomen</span></div>
      </div>
      <div class="right"><span class="chev">›</span></div>
    </div>
    <div class="hairline"></div>

    <div class="section" style="margin-top:22px;">
      <div class="eyebrow brand">Active cycle · Active</div>
      <div class="title lg" style="margin-top:8px;">BPC-157 solo</div>
    </div>

    <div class="hero-wrap" style="margin-top:18px;">
      <div style="position:relative; width:150px; height:150px;">
        <svg width="150" height="150" viewBox="0 0 150 150">
          <circle cx="75" cy="75" r="68" fill="none" stroke="rgba(26,23,20,0.10)" stroke-width="1.5"/>
          <circle cx="75" cy="75" r="68" fill="none" stroke="#8B6914" stroke-width="6" opacity="0.16" stroke-linecap="round" stroke-dasharray="427.3" stroke-dashoffset="290.6" transform="rotate(-90 75 75)"/>
          <circle cx="75" cy="75" r="68" fill="none" stroke="#8B6914" stroke-width="3" stroke-linecap="round" stroke-dasharray="427.3" stroke-dashoffset="290.6" transform="rotate(-90 75 75)"/>
        </svg>
        <div class="hero-center">
          <span class="num" style="font-size:50px; color:var(--ink1);">32<span class="unit" style="font-size:16px; color:var(--brand);">%</span></span>
          <span class="hero-label" style="margin-top:8px;">Day 9 of 28</span>
        </div>
      </div>
    </div>

    <div class="hairline mt20"></div>
    <div class="statpair">
      <div class="cell"><div class="lab">Day</div><div class="v">9<span class="u">/28</span></div></div>
      <div class="cell"><div class="lab">Progress</div><div class="v">32<span class="u">%</span></div></div>
      <div class="cell"><div class="lab">Remaining</div><div class="v">19<span class="u">d</span></div></div>
    </div>
    <div class="hairline"></div>

    <div class="prow" style="margin-top:6px;">
      <span class="dot" style="background:#0F766E;"></span>
      <span class="pname">BPC-157</span>
      <span class="pmeta">250<span class="du-chip">mcg</span> <span class="dim">· twice daily</span></span>
    </div>
  </div>

  <div class="tabbar">
    <div class="tb"><svg class="ic" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#857B6E" stroke-width="1.6"/><path d="M12 7v5l3.5 2" stroke="#857B6E" stroke-width="1.6" stroke-linecap="round"/></svg><span class="tl">Today</span></div>
    <div class="tb"><svg class="ic" viewBox="0 0 24 24" fill="none"><path d="M5 5h10a2 2 0 012 2v12H7a2 2 0 01-2-2V5z" stroke="#857B6E" stroke-width="1.6" stroke-linejoin="round"/><path d="M9 9h6M9 12h6" stroke="#857B6E" stroke-width="1.6" stroke-linecap="round"/></svg><span class="tl">Library</span></div>
    <div class="tb add"><div class="add-btn"><span class="plus">+</span></div></div>
    <div class="tb on"><svg class="ic" viewBox="0 0 24 24" fill="none"><path d="M12 4l8 4-8 4-8-4 8-4z" stroke="#1A1714" stroke-width="1.6" stroke-linejoin="round"/><path d="M4 12l8 4 8-4M4 16l8 4 8-4" stroke="#1A1714" stroke-width="1.6" stroke-linejoin="round"/></svg><span class="tl">Stacks</span></div>
    <div class="tb"><svg class="ic" viewBox="0 0 24 24" fill="none"><path d="M4 19V5M4 19h16M8 15l3-4 3 2 4-6" stroke="#857B6E" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="tl">Progress</span></div>
  </div>
</div>
</body></html>
